<!doctype html>
<html lang="en-GB" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Not Found | GreenMeans</title>
    
    <!-- Favicon Configuration -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" type="image/svg+xml" href="/favicon-round.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/android-chrome-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/android-chrome-512x512.png">

    <!-- Instagram Bugfix: Redirect URLs starting with /& instead of /? -->
    <script>
      (function() {
        if (window.location.pathname.startsWith('/&')) {
          var params = window.location.pathname.substring(2);
          if (window.location.search) {
            params += '&' + window.location.search.substring(1);
          }
          var newUrl = window.location.origin + '/?' + params + window.location.hash;
          window.location.replace(newUrl);
        } else {
          // Automatic fallback redirect for standard 404s
          setTimeout(function() {
            window.location.replace('https://greenmeans.ovh');
          }, 4000);
        }
      })();
    </script>
    
    <!-- Analytics -->
    <script defer src="https://info.greenmeans.ovh/assets_vital_metrics" data-website-id="cb768706-cd17-47ae-8a53-b2f3149132c1"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
  </head>
  <body class="text-white bg-black font-sans antialiased selection:bg-white/20">
    <div class="min-h-screen flex flex-col justify-between">
      <header class="bg-black border-b border-white/5">
        <nav aria-label="Main Navigation" class="max-w-7xl mx-auto px-2 sm:px-6 py-4 flex items-center justify-between gap-2 sm:gap-4">
          <div class="flex items-center shrink min-w-0">
            <a href="https://greenmeans.ovh" class="logo-container-fluid flex items-center rounded-lg group" aria-label="GreenMeans Brand">
              <div class="logo-fluid rounded-full border border-white/10 shadow-[0_0_8px_rgba(29,180,65,0.3)] shrink-0 overflow-hidden flex items-center justify-center" style="width: 2.5rem; height: 2.5rem;">
                <img src="/favicon-square.svg" alt="GreenMeans Logo" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300">
              </div>
              <span class="text-fluid font-light tracking-wide text-white truncate shrink ml-3 group-hover:text-[#1db441] transition-colors duration-300">GreenMeans</span>
            </a>
          </div>
        </nav>
      </header>

      <main class="flex-grow flex items-center justify-center">
        <section class="max-w-2xl px-6 py-20 text-center">
          <div class="inline-flex items-center justify-center w-24 h-24 rounded-full border border-white/10 shadow-[0_0_20px_rgba(29,180,65,0.2)] mb-8 bg-zinc-900/40">
            <svg class="w-10 h-10 text-[#18852c]" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
          </div>
          <h1 class="text-5xl md:text-6xl font-light tracking-tighter mb-6 text-white">Page Not Found</h1>
          <p class="text-xl text-zinc-400 mb-10 font-light leading-relaxed">
            The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.<br/>
            <span class="text-sm text-[#1db441] mt-4 block">Redirecting to the home page automatically...</span>
          </p>
          <a href="https://greenmeans.ovh" class="inline-flex items-center justify-center gap-2 px-8 py-4 text-sm font-medium uppercase tracking-widest text-white border border-[#1db441] rounded-full bg-[#1db441]/10 hover:bg-[#1db441]/20 shadow-[0_0_15px_rgba(29,180,65,0.2)] hover:shadow-[0_0_25px_rgba(29,180,65,0.4)] transition-all duration-300 focus:outline-none focus:ring-2 focus:ring-[#1db441]/50">
            Return to Home
            <svg class="w-4 h-4 text-[#1db441]" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3"></path></svg>
          </a>
        </section>
      </main>

      <footer class="border-t border-white/5 py-8 text-center text-sm font-light text-zinc-500">
        <p>&copy; 2026 GreenMeans. All rights reserved.</p>
      </footer>
    </div>
  </body>
</html>
